<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>皮皮 · 桌面学术助手</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Merriweather:wght@300;400;500;600;700;900&family=Nunito:wght@300;400;500;600;700&family=Comfortaa:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="nav-logo">
      <div class="nav-logo-text">
        <span class="nav-title">桌面宠物 · 皮皮</span>
      </div>
    </div>
    <div class="nav-indicators">
      <span id="serial-status" class="status-dot" title="串口"><i class="fas fa-plug"></i></span>
      <span id="llm-status" class="status-dot" title="LLM"><i class="fas fa-brain"></i></span>
      <span id="cam-status" class="status-dot" title="摄像头"><i class="fas fa-video"></i></span>
    </div>
  </div>
</nav>

<div class="dashboard">
  <!-- Top: Left (Face+Emotion+Camera+LED) | Right (Chat) -->
  <div class="top-row">
    <div class="left-col">
      <div class="card face-card">
        <div class="card-label"><i class="fas fa-smile"></i> 表情</div>
        <img id="face-img" src="/static/img/emo_normal_f0.png" alt="face" class="face-img">
        <div class="face-name" id="face-name">normal</div>
      </div>
      <div class="card emotion-card">
        <div class="card-label"><i class="fas fa-heart"></i> 情绪值</div>
        <div class="emotion-value" id="emotion-value">0.50</div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="emotion-bar"></div>
        </div>
        <div class="emotion-desc" id="emotion-desc">心情不错</div>
        <div class="fsm-state" id="fsm-state">IDLE</div>
        <div class="led-inline">
          <div class="led-circle" id="led-circle"></div>
        </div>
      </div>
      <div class="card camera-card">
        <div class="card-label"><i class="fas fa-video"></i> 摄像头</div>
        <img id="camera-feed" src="" alt="摄像头" class="camera-feed">
        <div class="camera-status" id="camera-status">OFFLINE</div>
      </div>
    </div>
    <div class="right-col">
      <div class="card chat-card">
        <div class="card-label"><i class="fas fa-comments"></i> 聊天</div>
        <div class="chat-messages" id="chat-messages">
          <div class="chat-msg system">皮皮启动中...</div>
        </div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="和皮皮说点什么..." />
          <button id="chat-send"><i class="fas fa-paper-plane"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom: Debug (left) | Log (right) -->
  <div class="bottom-row">
    <div class="card debug-card">
      <div class="card-label"><i class="fas fa-sliders"></i> 调试</div>
      <div class="debug-grid">
        <div class="debug-group">
          <label>状态</label>
          <select id="debug-state">
            <option value="IDLE">IDLE</option><option value="ACTIVE">ACTIVE</option>
            <option value="INTERACT">INTERACT</option><option value="SLEEP">SLEEP</option>
            <option value="ALERT">ALERT</option>
          </select>
        </div>
        <div class="debug-group">
          <label>表情</label>
          <select id="debug-expr">
            <option value="0">NORMAL</option><option value="1">HAPPY</option>
            <option value="2">FOCUS</option><option value="3">ANGRY</option>
            <option value="4">SLEEP</option><option value="5">SURPRISE</option>
            <option value="6">SAD</option><option value="7">LOVE</option>
          </select>
        </div>
        <div class="debug-group">
          <label>情绪值</label>
          <input type="range" id="debug-emotion" min="0" max="100" value="50">
          <span id="debug-emotion-val">0.50</span>
        </div>
        <div class="debug-group">
          <label>RGB</label>
          <div class="debug-rgb">
            <input type="number" id="debug-r" value="0" min="0" max="255" class="rgb-in">
            <input type="number" id="debug-g" value="0" min="0" max="255" class="rgb-in">
            <input type="number" id="debug-b" value="0" min="0" max="255" class="rgb-in">
          </div>
        </div>
        <button id="debug-apply" class="btn">应用</button>
        <button id="debug-test-touch" class="btn btn-sm">测试触摸</button>
        <button id="debug-test-nfc" class="btn btn-sm">测试 NFC</button>
      </div>
    </div>
    <div class="card log-card">
      <div class="card-label"><i class="fas fa-terminal"></i> 日志</div>
      <div class="log-container" id="log-container">
        <div class="log-entry">系统就绪</div>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
